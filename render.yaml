services:
  - type: web
    name: assistme
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: ASSISTME_STATE_DIR
        value: /data/.assistme
      - key: ASSISTME_WORKSPACE_DIR
        value: /data/workspace
      - key: ASSISTME_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: assistme-data
      mountPath: /data
      sizeGB: 1
